# ============================================================
# K8s Secrets — DO NOT commit with real values.
#
# PRODUCTION: Use External Secrets Operator (see external-secrets.yaml)
#             or Sealed Secrets to manage these securely.
#
# DEV/STAGING: Create from CLI:
#
#   kubectl create secret generic llm-platform-secrets \
#     --namespace=llm-platform \
#     --from-literal=SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 16)" \
#     --from-literal=REDIS_PASSWORD="$(openssl rand -hex 16)" \
#     --from-literal=CREDENTIAL_ENCRYPTION_KEY="$(python3 -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" \
#     --from-literal=N8N_CALLBACK_SECRET="$(openssl rand -hex 16)" \
#     --from-literal=STRIPE_SECRET_KEY="" \
#     --from-literal=STRIPE_WEBHOOK_SECRET="" \
#     --from-literal=STRIPE_PRO_PRICE_ID="" \
#     --from-literal=STRIPE_ENTERPRISE_PRICE_ID="" \
#     --from-literal=HF_TOKEN="" \
#     --from-literal=AGENT_LLM_API_KEY="" \
#     --from-literal=N8N_BASIC_AUTH_PASSWORD="$(openssl rand -hex 12)"
#
# NEVER store real secret values in this file.
# The template below is for reference only — all values are placeholders.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: llm-platform-secrets
  namespace: llm-platform
  labels:
    app.kubernetes.io/part-of: llm-platform
  annotations:
    # Remind operators this is a template
    description: "TEMPLATE ONLY — create secrets via CLI or External Secrets Operator"
type: Opaque
stringData:
  # ── Auth & Encryption ──
  SECRET_KEY: "REPLACE_ME_WITH_openssl_rand_hex_32"
  CREDENTIAL_ENCRYPTION_KEY: "REPLACE_ME_WITH_FERNET_KEY"
  N8N_CALLBACK_SECRET: "REPLACE_ME_WITH_RANDOM_SECRET"

  # ── Database ──
  POSTGRES_PASSWORD: "REPLACE_ME_WITH_STRONG_PASSWORD"
  REDIS_PASSWORD: "REPLACE_ME_WITH_STRONG_PASSWORD"

  # ── Stripe ──
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  STRIPE_PRO_PRICE_ID: ""
  STRIPE_ENTERPRISE_PRICE_ID: ""

  # ── AI / ML ──
  HF_TOKEN: ""
  AGENT_LLM_API_KEY: ""

  # ── n8n ──
  N8N_BASIC_AUTH_PASSWORD: "REPLACE_ME"
