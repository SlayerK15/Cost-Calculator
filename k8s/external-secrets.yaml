# ============================================================
# External Secrets Operator (ESO) integration.
#
# This manifest uses ESO to pull secrets from a cloud secrets
# manager (AWS Secrets Manager, GCP Secret Manager, Azure Key
# Vault, or HashiCorp Vault) instead of storing them in-cluster.
#
# Prerequisites:
#   1. Install ESO:  helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#   2. Create a SecretStore or ClusterSecretStore pointing to your vault.
#   3. Populate the secrets in your vault under the paths referenced below.
#
# If you do NOT use ESO, you can skip this file and manage
# secrets via `kubectl create secret` (see secrets.yaml).
# ============================================================

# -- ClusterSecretStore (one per cluster, shared across namespaces) --
# Uncomment and configure ONE of the provider blocks below.

# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: llm-platform-vault
# spec:
#   provider:
#     # ── AWS Secrets Manager ──
#     aws:
#       service: SecretsManager
#       region: us-east-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: external-secrets-sa
#             namespace: external-secrets
#
#     # ── GCP Secret Manager ──
#     # gcpsm:
#     #   projectID: your-gcp-project-id
#     #   auth:
#     #     workloadIdentity:
#     #       clusterLocation: us-central1
#     #       clusterName: llm-platform
#     #       serviceAccountRef:
#     #         name: external-secrets-sa
#     #         namespace: external-secrets
#
#     # ── Azure Key Vault ──
#     # azurekv:
#     #   vaultUrl: "https://your-keyvault.vault.azure.net"
#     #   authType: ManagedIdentity
#
#     # ── HashiCorp Vault ──
#     # vault:
#     #   server: "https://vault.example.com"
#     #   path: "secret"
#     #   version: "v2"
#     #   auth:
#     #     kubernetes:
#     #       mountPath: "kubernetes"
#     #       role: "llm-platform"

---
# -- ExternalSecret: pulls secrets from the vault into a K8s Secret --
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-platform-secrets
  namespace: llm-platform
spec:
  refreshInterval: 1h           # Re-sync from vault every hour
  secretStoreRef:
    name: llm-platform-vault
    kind: ClusterSecretStore

  target:
    name: llm-platform-secrets   # K8s Secret name (matches backend.yaml refs)
    creationPolicy: Owner        # ESO owns the Secret lifecycle
    deletionPolicy: Retain       # Keep Secret if ExternalSecret is deleted
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: llm-platform

  data:
    # ── Auth & Encryption ──
    - secretKey: SECRET_KEY
      remoteRef:
        key: llm-platform/secret-key          # Path in your vault

    - secretKey: CREDENTIAL_ENCRYPTION_KEY
      remoteRef:
        key: llm-platform/credential-encryption-key

    - secretKey: N8N_CALLBACK_SECRET
      remoteRef:
        key: llm-platform/n8n-callback-secret

    # ── Database ──
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: llm-platform/postgres-password

    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: llm-platform/redis-password

    # ── Stripe ──
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: llm-platform/stripe-secret-key

    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: llm-platform/stripe-webhook-secret

    - secretKey: STRIPE_PRO_PRICE_ID
      remoteRef:
        key: llm-platform/stripe-pro-price-id

    - secretKey: STRIPE_ENTERPRISE_PRICE_ID
      remoteRef:
        key: llm-platform/stripe-enterprise-price-id

    # ── AI / ML ──
    - secretKey: HF_TOKEN
      remoteRef:
        key: llm-platform/hf-token

    - secretKey: AGENT_LLM_API_KEY
      remoteRef:
        key: llm-platform/agent-llm-api-key

    # ── n8n ──
    - secretKey: N8N_BASIC_AUTH_PASSWORD
      remoteRef:
        key: llm-platform/n8n-basic-auth-password
