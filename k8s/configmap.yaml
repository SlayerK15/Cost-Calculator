apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-platform-config
  namespace: llm-platform
  labels:
    app.kubernetes.io/part-of: llm-platform
data:
  # ── Application ──
  APP_NAME: "LLM Cloud Cost & Deployment Platform"
  APP_VERSION: "0.1.0"
  DEBUG: "false"                                       # NEVER true in production

  # ── Auth ──
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "480"                   # 8 hours

  # ── CORS (set to your actual domain) ──
  CORS_ORIGINS: "https://your-domain.com"
  FRONTEND_URL: "https://your-domain.com"

  # ── AI Agent ──
  AGENT_LLM_PROVIDER: "openai"
  AGENT_LLM_MODEL: "gpt-4o-mini"

  # ── n8n (internal service URL) ──
  N8N_WEBHOOK_URL: "http://n8n-svc:5678/webhook/autonomous-llm-builder"

  # ── Upload ──
  MAX_UPLOAD_SIZE_GB: "50"
  UPLOAD_DIR: "/tmp/llm-uploads"
